name: main5 release gate

on:
  push:
    branches: ["main"]
    paths:
      - "artifacts/main5_execution_gate_**"
      - "scripts/check_main5_release_gate.py"
      - "scripts/evaluate_main5_tolerance_ladder.py"
  pull_request:
    paths:
      - "artifacts/main5_execution_gate_**"
      - "scripts/check_main5_release_gate.py"
      - "scripts/evaluate_main5_tolerance_ladder.py"
  workflow_dispatch:

jobs:
  main5-release-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e . --quiet

      - name: Run composite release gate
        run: |
          python scripts/check_main5_release_gate.py \
            --guardrail-json artifacts/main5_execution_gate_tolerance_guardrail_check.json \
            --evaluator-json artifacts/main5_execution_gate_tolerance_evaluator_deeper_2026-04-28.json \
            --promotion-json artifacts/main5_execution_gate_promotion_confirmation_seed6_2026-04-28.json \
            --activity-json artifacts/main5_execution_gate_activity_threshold_sensitivity_2026-04-28.json \
            --out-json /tmp/main5_release_gate_ci_run.json

      - name: Upload gate result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: main5-release-gate-result
          path: /tmp/main5_release_gate_ci_run.json
